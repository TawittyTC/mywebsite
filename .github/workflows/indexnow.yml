name: IndexNow — Notify search engines on push

on:
  push:
    branches: [master]

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Submit URLs to IndexNow (Bing, DuckDuckGo, Yahoo, Yandex)
        run: |
          KEY="0f7df95ac7756cc87e4e24046cc6d3b6"
          HOST="tawittytc.github.io"
          URL="https://tawittytc.github.io/mywebsite/"

          PAYLOAD=$(cat <<EOF
          {
            "host": "$HOST",
            "key": "$KEY",
            "keyLocation": "https://$HOST/mywebsite/$KEY.txt",
            "urlList": ["$URL"]
          }
          EOF
          )

          echo "Submitting to Bing IndexNow..."
          STATUS=$(curl -s -o /tmp/bing_resp.txt -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")
          echo "Bing: HTTP $STATUS — $(cat /tmp/bing_resp.txt)"

          echo "Submitting to Yandex IndexNow..."
          STATUS=$(curl -s -o /tmp/yandex_resp.txt -w "%{http_code}" \
            -X POST "https://yandex.com/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")
          echo "Yandex: HTTP $STATUS — $(cat /tmp/yandex_resp.txt)"
